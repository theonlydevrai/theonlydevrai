<svg xmlns="http://www.w3.org/2000/svg" width="450" height="280" viewBox="0 0 450 280" fill="none">
  <style>
    .tv-frame { fill: #1c1b22; stroke: #3a3847; stroke-width: 3; rx: 8; ry: 8; }
    .tv-screen { fill: #0a0512; stroke: #00f0ff; stroke-width: 1.5; filter: drop-shadow(0px 0px 6px rgba(0, 240, 255, 0.3)); }
    .tv-stand { fill: #2d2b38; }
    
    /* App Icons */
    .app-card { fill: #13121d; stroke: #313244; stroke-width: 1.2; rx: 6; ry: 6; }
    .app-card-focus { fill: #13121d; stroke: #ff007f; stroke-width: 1.5; filter: drop-shadow(0 0 4px #ff007f); rx: 6; ry: 6; }
    .lbl-txt { font-family: 'Fira Code', monospace, sans-serif; font-size: 7px; fill: #8b949e; text-anchor: middle; font-weight: bold; }
    .title-txt { font-family: 'Fira Code', monospace; font-size: 10px; fill: #ffffff; font-weight: bold; }
  </style>

  <!-- TV Stand -->
  <polygon points="190,240 260,240 280,265 170,265" class="tv-stand" />
  <rect x="215" y="225" width="20" height="20" class="tv-stand" />

  <!-- TV Chassis -->
  <rect x="20" y="20" width="410" height="210" class="tv-frame" />
  
  <!-- OLED screen surface -->
  <rect x="30" y="30" width="390" height="190" class="tv-screen" />

  <!-- Header Dashboard -->
  <g transform="translate(45, 52)">
    <text x="0" y="0" class="title-txt">SMART HUB // SOCIALS &amp; MEDIA</text>
    <text x="360" y="0" class="title-txt" fill="#ff007f" text-anchor="end">18:32 PM</text>
    <line x1="0" y1="8" x2="360" y2="8" stroke="#313244" stroke-width="1" />
  </g>

  <!-- Apps Grid Row (Sequence: LinkedIn, Chrome, Instagram, YouTube, Spotify, Netflix) -->
  <!-- App 1: LinkedIn (X=37) -->
  <g transform="translate(37, 85)">
    <rect width="50" height="50" class="app-card" />
    <rect x="11" y="11" width="28" height="28" fill="#0077b5" rx="3.5" />
    <text x="25" y="32" font-family="'Fira Code', monospace, sans-serif" font-weight="bold" font-size="18" fill="#ffffff" text-anchor="middle">in</text>
    <text x="25" y="62" class="lbl-txt">LINKEDIN</text>
  </g>

  <!-- App 2: Google Chrome (X=102) -->
  <g transform="translate(102, 85)">
    <rect width="50" height="50" class="app-card" />
    <g transform="rotate(-45 25 25)">
      <circle cx="25" cy="25" r="13" fill="#ffffff" />
      <path d="M 25 12 A 13 13 0 0 1 36.2 31.6 L 25 25 Z" fill="#ea4335" />
      <path d="M 36.2 31.6 A 13 13 0 0 1 13.8 31.6 L 25 25 Z" fill="#fbbc05" />
      <path d="M 13.8 31.6 A 13 13 0 0 1 25 12 L 25 25 Z" fill="#34a853" />
      <circle cx="25" cy="25" r="6.5" fill="#ffffff" />
      <circle cx="25" cy="25" r="5" fill="#1a73e8" />
    </g>
    <text x="25" y="62" class="lbl-txt">CHROME</text>
  </g>

  <!-- App 3: Instagram (X=167) -->
  <g transform="translate(167, 85)">
    <rect width="50" height="50" class="app-card" />
    <rect x="13" y="13" width="24" height="24" rx="6.5" stroke="#ff007f" stroke-width="2.2" fill="none" />
    <circle cx="25" cy="25" r="5.5" stroke="#ff007f" stroke-width="2.2" fill="none" />
    <circle cx="31" cy="19" r="1.5" fill="#ff007f" />
    <text x="25" y="62" class="lbl-txt">INSTAGRAM</text>
  </g>

  <!-- App 4: YouTube (Focused, X=232) -->
  <g transform="translate(232, 85)">
    <rect width="50" height="50" class="app-card-focus" />
    <rect x="12" y="17" width="26" height="16" rx="3" fill="#ff0055" />
    <polygon points="22,21 22,29 29,25" fill="#ffffff" />
    <text x="25" y="62" class="lbl-txt" fill="#ff007f">YOUTUBE</text>
  </g>

  <!-- App 5: Spotify (X=297) -->
  <g transform="translate(297, 85)">
    <rect width="50" height="50" class="app-card" />
    <circle cx="25" cy="25" r="13" fill="#1db954" />
    <path d="M 17 22 Q 25 18 33 22 M 19 26 Q 25 22 31 26 M 21 30 Q 25 27 29 30" stroke="#111" stroke-width="2" stroke-linecap="round" fill="none" />
    <text x="25" y="62" class="lbl-txt">SPOTIFY</text>
  </g>

  <!-- App 6: Netflix (X=362) -->
  <g transform="translate(362, 85)">
    <rect width="50" height="50" class="app-card" />
    <path d="M 18 12 V 38 M 18 12 L 32 38 V 12" stroke="#ff0055" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <text x="25" y="62" class="lbl-txt">NETFLIX</text>
  </g>

  <!-- TV System Info Bar at bottom -->
  <rect x="45" y="198" width="360" height="12" rx="2" fill="#13121d" />
  <circle cx="55" cy="204" r="3" fill="#7ee787" />
  <text x="64" y="207" font-family="'Fira Code', monospace" font-size="6" fill="#8b949e">WIFI CONNECTION STABLE [IP: 192.168.1.104]</text>
</svg>
