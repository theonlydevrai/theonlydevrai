<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72" id="linkedin">
  <style>
    @keyframes linkedinScalePop {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      19.9% {
        transform: scale(1);
        opacity: 1;
      }
      20% {
        transform: scale(0.3);
        opacity: 0;
      }
      23% {
        transform: scale(1.05);
        opacity: 1;
      }
      24.2% {
        transform: scale(0.98);
      }
      26% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes linkedinRotatePop {
      0% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
      21.9% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
      22% {
        transform: scale(0) rotate(-15deg);
        opacity: 0;
      }
      26.55% {
        transform: scale(1.1) rotate(5deg);
        opacity: 1;
      }
      27.95% {
        transform: scale(0.95) rotate(-2deg);
      }
      29% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    .bg-box {
      transform-origin: 36px 36px;
      animation: linkedinScalePop 10s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
    }

    .logo-linkedin {
      transform-origin: 36px 36px;
      animation: linkedinRotatePop 10s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
    }
  </style>
  <g id="providers-list" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1">
