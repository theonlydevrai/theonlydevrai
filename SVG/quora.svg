<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="1067" height="1067" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2" id="quora">
  <style>
    @keyframes quoraScalePop {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      79.9% {
        transform: scale(1);
        opacity: 1;
      }
      80% {
        transform: scale(0.3);
        opacity: 0;
      }
      83% {
        transform: scale(1.05);
        opacity: 1;
      }
      84.2% {
        transform: scale(0.98);
      }
      86% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes quoraRotatePop {
      0% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
      81.9% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
      82% {
        transform: scale(0) rotate(-15deg);
        opacity: 0;
      }
      86.55% {
        transform: scale(1.1) rotate(5deg);
        opacity: 1;
      }
      87.95% {
        transform: scale(0.95) rotate(-2deg);
      }
      89% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    .bg-box {
      transform-origin: 533.5px 533.5px;
      animation: quoraScalePop 10s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
    }

    .logo-q {
      transform-origin: 533.5px 533.5px;
      animation: quoraRotatePop 10s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
    }
  </style>
