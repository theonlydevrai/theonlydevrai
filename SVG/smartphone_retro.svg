<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450" viewBox="0 0 300 450" fill="none">
  <style>
    .phone-base { fill: #11111b; stroke: #313244; stroke-width: 4; rx: 20; ry: 20; }
    .slider-screen { fill: #1e1e2e; stroke: #ff007f; stroke-width: 2.5; rx: 16; ry: 16; filter: drop-shadow(0px 6px 12px rgba(0,0,0,0.4)); }
    .glass-surface { fill: #0a0512; stroke: #3a3847; stroke-width: 1; rx: 10; ry: 10; }
    
    /* Backlit Keypad Keys */
    .key-cap { fill: #1a1b26; stroke: #00f0ff; stroke-width: 1.2; rx: 4; ry: 4; filter: drop-shadow(0 0 1.5px rgba(0, 240, 255, 0.4)); }
    .key-cap-func { fill: #24283b; stroke: #ff007f; stroke-width: 1.2; rx: 4; ry: 4; filter: drop-shadow(0 0 1.5px rgba(255, 0, 127, 0.4)); }
    .key-lbl { fill: #ffffff; font-family: 'Fira Code', monospace; font-size: 8px; text-anchor: middle; font-weight: bold; }
    
    /* Screen Sliding Animation */
    .slider-screen-group { animation: slide-screen 6s infinite ease-in-out; }
    @keyframes slide-screen {
      0%, 15%, 85%, 100% { transform: translateY(0px); }
      35%, 65% { transform: translateY(-160px); }
    }
    
    .hud-txt { font-family: 'Fira Code', monospace; font-size: 10px; fill: #ffffff; }
    .led-glow { fill: #ff007f; filter: drop-shadow(0 0 2.5px #ff007f); }
  </style>

  <!-- Slider Phone Under-Base Chassis -->
  <rect x="25" y="20" width="250" height="410" class="phone-base" />

  <!-- Full QWERTY Keyboard Keys -->
  <g transform="translate(0, 0)">
    <!-- Row 1 (Q to P, Y=290) -->
    <g transform="translate(42, 290)">
      <rect x="0" width="18" height="18" class="key-cap" /><text x="9" y="12" class="key-lbl">Q</text>
      <rect x="22" width="18" height="18" class="key-cap" /><text x="31" y="12" class="key-lbl">W</text>
      <rect x="44" width="18" height="18" class="key-cap" /><text x="53" y="12" class="key-lbl">E</text>
      <rect x="66" width="18" height="18" class="key-cap" /><text x="75" y="12" class="key-lbl">R</text>
      <rect x="88" width="18" height="18" class="key-cap" /><text x="97" y="12" class="key-lbl">T</text>
      <rect x="110" width="18" height="18" class="key-cap" /><text x="119" y="12" class="key-lbl">Y</text>
      <rect x="132" width="18" height="18" class="key-cap" /><text x="141" y="12" class="key-lbl">U</text>
      <rect x="154" width="18" height="18" class="key-cap" /><text x="163" y="12" class="key-lbl">I</text>
      <rect x="176" width="18" height="18" class="key-cap" /><text x="185" y="12" class="key-lbl">O</text>
      <rect x="198" width="18" height="18" class="key-cap" /><text x="207" y="12" class="key-lbl">P</text>
    </g>
    
    <!-- Row 2 (A to L, Y=315) -->
    <g transform="translate(53, 315)">
      <rect x="0" width="18" height="18" class="key-cap" /><text x="9" y="12" class="key-lbl">A</text>
      <rect x="22" width="18" height="18" class="key-cap" /><text x="31" y="12" class="key-lbl">S</text>
      <rect x="44" width="18" height="18" class="key-cap" /><text x="53" y="12" class="key-lbl">D</text>
      <rect x="66" width="18" height="18" class="key-cap" /><text x="75" y="12" class="key-lbl">F</text>
      <rect x="88" width="18" height="18" class="key-cap" /><text x="97" y="12" class="key-lbl">G</text>
      <rect x="110" width="18" height="18" class="key-cap" /><text x="119" y="12" class="key-lbl">H</text>
      <rect x="132" width="18" height="18" class="key-cap" /><text x="141" y="12" class="key-lbl">J</text>
      <rect x="154" width="18" height="18" class="key-cap" /><text x="163" y="12" class="key-lbl">K</text>
      <rect x="176" width="18" height="18" class="key-cap" /><text x="185" y="12" class="key-lbl">L</text>
    </g>

    <!-- Row 3 (Shift, Z to M, Backspace, Y=340) -->
    <g transform="translate(42, 340)">
      <rect x="0" width="28" height="18" class="key-cap-func" /><text x="14" y="12" class="key-lbl" font-size="6">SHFT</text>
      <g transform="translate(32, 0)">
        <rect x="0" width="18" height="18" class="key-cap" /><text x="9" y="12" class="key-lbl">Z</text>
        <rect x="22" width="18" height="18" class="key-cap" /><text x="31" y="12" class="key-lbl">X</text>
        <rect x="44" width="18" height="18" class="key-cap" /><text x="53" y="12" class="key-lbl">C</text>
        <rect x="66" width="18" height="18" class="key-cap" /><text x="75" y="12" class="key-lbl">V</text>
        <rect x="88" width="18" height="18" class="key-cap" /><text x="97" y="12" class="key-lbl">B</text>
        <rect x="110" width="18" height="18" class="key-cap" /><text x="119" y="12" class="key-lbl">N</text>
        <rect x="132" width="18" height="18" class="key-cap" /><text x="141" y="12" class="key-lbl">M</text>
      </g>
      <rect x="186" width="28" height="18" class="key-cap-func" /><text x="200" y="12" class="key-lbl" font-size="6">DEL</text>
    </g>

    <!-- Row 4 (Sym, Space, Enter, Y=365) -->
    <g transform="translate(42, 365)">
      <rect x="0" width="34" height="18" class="key-cap-func" /><text x="17" y="12" class="key-lbl" font-size="7">SYM</text>
      <rect x="38" width="138" height="18" class="key-cap" /><text x="107" y="12" class="key-lbl" font-size="7" letter-spacing="1">SPACE</text>
      <rect x="180" width="34" height="18" class="key-cap-func" /><text x="197" y="12" class="key-lbl" font-size="7">ENT</text>
    </g>
  </g>

  <!-- Slider Top Phone Shell -->
  <g class="slider-screen-group">
    <rect x="25" y="20" width="250" height="410" class="slider-screen" />
    <rect x="35" y="30" width="230" height="390" class="glass-surface" />

    <!-- Speaker & Camera -->
    <rect x="120" y="38" width="60" height="4" rx="2" fill="#1c1b22" />
    <circle cx="105" cy="40" r="3" fill="#00f0ff" />

    <!-- Lockscreen UI Display -->
    <g transform="translate(150, 150)">
      <text x="0" y="0" class="hud-txt" font-size="28" font-weight="bold" text-anchor="middle">18:32</text>
      <text x="0" y="18" class="hud-txt" font-size="8" fill="#ff007f" text-anchor="middle">SLIDE UP TO UNLOCK</text>
      <path d="M 140 160 L 150 150 L 160 160" fill="none" stroke="#ff007f" stroke-width="1.5" stroke-linecap="round" transform="translate(-150, 20)" />
    </g>

    <!-- UI Widgets (Updated texts) -->
    <g transform="translate(50, 240)">
      <rect width="200" height="44" fill="#11111b" stroke="#313244" stroke-width="1" rx="8" />
      <circle cx="20" cy="22" r="5" class="led-glow" />
      <text x="36" y="18" class="hud-txt" font-size="7.5" fill="#ffffff" font-weight="bold">NEW UPDATE REGARDING CJI</text>
      <text x="36" y="30" class="hud-txt" font-size="6.5" fill="#8b949e">Chief Justice of India</text>
    </g>
    
    <g transform="translate(50, 294)">
      <rect width="200" height="44" fill="#11111b" stroke="#313244" stroke-width="1" rx="8" />
      <circle cx="20" cy="22" r="5" class="led-glow" fill="#00f0ff" style="filter: drop-shadow(0 0 2.5px #00f0ff);" />
      <text x="36" y="18" class="hud-txt" font-size="7.5" fill="#ffffff" font-weight="bold">What are your views?</text>
      <text x="36" y="30" class="hud-txt" font-size="6.5" fill="#8b949e">Type it out...</text>
    </g>

    <!-- Nav bar notch -->
    <rect x="100" y="410" width="100" height="4" rx="2" fill="#8b949e" opacity="0.6" />
  </g>
</svg>
