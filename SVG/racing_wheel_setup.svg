<svg xmlns="http://www.w3.org/2000/svg" width="450" height="300" viewBox="0 0 450 300" fill="none">
  <style>
    .screen-bg { fill: #07090e; stroke: #313244; stroke-width: 2.5; rx: 8; ry: 8; }
    .screen-glass { fill: #0a0512; stroke: #ff007f; stroke-width: 1.5; filter: drop-shadow(0px 0px 6px rgba(255, 0, 127, 0.4)); rx: 4; ry: 4; }
    
    /* Steering Wheel */
    .wheel-rim { fill: none; stroke: #181922; stroke-width: 11; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4)); }
    .wheel-grip { stroke: #2a2b36; stroke-width: 11; stroke-linecap: round; }
    .hub-center { fill: #1f2335; stroke: #ff007f; stroke-width: 1.5; }
    
    /* Pedals */
    .pedal-base { fill: #1c1b22; stroke: #313244; stroke-width: 1.5; }
    .pedal-plate { fill: #2d2b38; stroke: #8b949e; stroke-width: 1; rx: 2; ry: 2; }
    
    /* Telemetry Graphics */
    .hud-line-bg { stroke: #1f2335; stroke-width: 3.5; fill: none; }
    .hud-line-val { stroke: #00f0ff; stroke-width: 3.5; fill: none; stroke-linecap: round; }
    .hud-track { stroke: #bb9af3; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .hud-txt { font-family: 'Fira Code', monospace; font-size: 7px; fill: #ffffff; }
    .hud-val { fill: #7ee787; font-weight: bold; }
    
    /* Steering Rotation Animation */
    .steer-wheel-group {
      transform-origin: 225px 200px;
      animation: steer-rotate 6s infinite ease-in-out;
    }
    @keyframes steer-rotate {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(-50deg); }
      50% { transform: rotate(0deg); }
      75% { transform: rotate(50deg); }
      100% { transform: rotate(0deg); }
    }

    /* Blinkers */
    .led-glow { fill: #7ee787; filter: drop-shadow(0 0 3px #7ee787); animation: r-blink 1s infinite alternate; }
    @keyframes r-blink {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }
  </style>

  <!-- Sim Floor Base (Background behind pedals) -->
  <rect x="100" y="250" width="250" height="40" class="pedal-base" rx="6" />

  <!-- Pedals -->
  <!-- Clutch Pedal (Left) -->
  <g transform="translate(130, 246)">
    <rect x="0" y="0" width="16" height="34" class="pedal-plate" />
    <line x1="8" y1="4" x2="8" y2="30" stroke="#111" stroke-width="1.5" stroke-dasharray="2 2" />
  </g>
  <!-- Brake Pedal (Center) -->
  <g transform="translate(212, 246)">
    <rect x="0" y="0" width="26" height="34" class="pedal-plate" stroke="#ff007f" stroke-width="1.2" />
    <line x1="13" y1="4" x2="13" y2="30" stroke="#ff007f" stroke-width="1.5" stroke-dasharray="2 2" />
  </g>
  <!-- Throttle Pedal (Right) -->
  <g transform="translate(304, 242)">
    <rect x="0" y="0" width="16" height="38" class="pedal-plate" stroke="#00f0ff" stroke-width="1.2" />
    <line x1="8" y1="4" x2="8" y2="34" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="2 2" />
  </g>

  <!-- Curved Dashboard Monitor Screen (Top center) -->
  <rect x="40" y="20" width="370" height="96" class="screen-bg" />
  <rect x="46" y="26" width="358" height="84" class="screen-glass" />

  <!-- Dashboard HUD graphics -->
  <!-- Speedometer dial on left (Center: 110, 68) -->
  <g transform="translate(110, 68)">
    <circle cx="0" cy="0" r="26" class="hud-line-bg" stroke-dasharray="122.5 163.3" transform="rotate(135)" />
    <circle cx="0" cy="0" r="26" class="hud-line-val" stroke-dasharray="90 163.3" transform="rotate(135)" />
    
    <!-- Indicator needle -->
    <line x1="0" y1="0" x2="15" y2="-18" stroke="#ff0055" stroke-width="2" stroke-linecap="round" />
    <text x="0" y="9" class="hud-txt" text-anchor="middle" font-size="6">RPM x1000</text>
    
    <!-- Speedometer readout -->
    <text x="-12" y="26" class="hud-txt" font-size="10">240<tspan font-size="5" fill="#8b949e"> KM/H</tspan></text>
  </g>

  <!-- Racetrack Map on right (Center: 320, 68) -->
  <g transform="translate(335, 68)">
    <path d="M 0 -22 C 30 -22, 50 -10, 40 10 C 30 25, 10 20, 0 15 C -15 10, -10 -10, -25 -10 C -40 -10, -35 -22, 0 -22 Z" class="hud-track" />
    <!-- Blinking player position dot on track -->
    <circle cx="28" cy="18" r="3.5" class="led-glow" />
    <text x="-75" y="0" class="hud-txt">TRACK: <tspan class="hud-val">SPA</tspan></text>
    <text x="-75" y="10" class="hud-txt">LAP: <tspan class="hud-val" fill="#ffe600">3/5</tspan></text>
  </g>

  <!-- Gear status indicator (Center of screen) -->
  <g transform="translate(225, 68)">
    <rect x="-14" y="-18" width="28" height="32" fill="#131218" stroke="#ff007f" stroke-width="1" rx="2" />
    <text x="0" y="3" font-family="'Fira Code', monospace" font-size="18" fill="#00f0ff" font-weight="bold" text-anchor="middle">5</text>
  </g>

  <!-- Steering Wheel assembly (Center Y=200, X=225) with Rotation Animation -->
  <!-- Metal steering shaft column behind wheel -->
  <rect x="210" y="110" width="30" height="90" fill="#2d2b38" stroke="#1c1b22" stroke-width="2" />
  
  <g class="steer-wheel-group">
    <!-- Left/Right Gear shifting paddle switches behind wheel -->
    <path d="M 145 160 L 155 160 L 155 200 L 140 200 Z" fill="#11111b" stroke="#313244" />
    <path d="M 305 160 L 295 160 L 295 200 L 310 200 Z" fill="#11111b" stroke="#313244" />

    <!-- Circular Rim -->
    <circle cx="225" cy="200" r="70" class="wheel-rim" />
    <!-- Leather Grips on sides -->
    <path d="M 161 175 A 70 70 0 0 1 161 225" class="wheel-grip" />
    <path d="M 289 175 A 70 70 0 0 0 289 225" class="wheel-grip" />

    <!-- Center Hub -->
    <path d="M 155 200 L 205 200 L 215 225 L 235 225 L 245 200 L 295 200 M 225 225 L 225 270" stroke="#1c1b22" stroke-width="12" stroke-linecap="round" fill="none" />

    <!-- Center Carbon Fiber Cap -->
    <circle cx="225" cy="200" r="24" class="hub-center" />
    <path d="M 219 203 L 225 194 L 231 203 Z" fill="none" stroke="#00f0ff" stroke-width="1.5" />
    
    <!-- Control Buttons on Hub spokes -->
    <circle cx="185" cy="190" r="3.5" fill="#ff0055" />
    <circle cx="195" cy="190" r="3.5" fill="#00f0ff" />
    <circle cx="255" cy="190" r="3.5" fill="#ffe600" />
    <circle cx="265" cy="190" r="3.5" fill="#7ee787" />

    <!-- F1 Shift Lights LED Strip on top rim segment -->
    <g transform="translate(195, 126)">
      <circle cx="10" cy="0" r="2" fill="#4ade80" />
      <circle cx="20" cy="0" r="2" fill="#4ade80" />
      <circle cx="30" cy="0" r="2" fill="#ffe600" />
      <circle cx="40" cy="0" r="2" fill="#ff0055" style="filter: drop-shadow(0 0 1.5px #ff0055);" />
      <circle cx="50" cy="0" r="2" fill="#ff0055" style="filter: drop-shadow(0 0 1.5px #ff0055);" />
    </g>
  </g>
</svg>
