<svg xmlns="http://www.w3.org/2000/svg" width="450" height="200" viewBox="0 0 450 200" fill="none">
  <style>
    .bezel { fill: #1c1b22; stroke: #3a3847; stroke-width: 2; rx: 8; ry: 8; }
    .screen { fill: #0a0512; stroke: #ff007f; stroke-width: 1; rx: 3; ry: 3; }
    
    /* Joy-Cons */
    .joycon-l { fill: #00f0ff; stroke: #008fa8; stroke-width: 1.5; }
    .joycon-r { fill: #ff0055; stroke: #9e0031; stroke-width: 1.5; }
    
    /* Controls */
    .stick-base { fill: #11111b; stroke: #313244; stroke-width: 1; }
    .btn-dark { fill: #1c1b22; stroke: #11111b; }
    
    /* Launcher Menu */
    .game-card { fill: #161925; stroke: #30363d; stroke-width: 1; rx: 4; ry: 4; }
    .game-txt { font-family: 'Fira Code', monospace, sans-serif; font-size: 7.5px; fill: #ffffff; }
  </style>

  <!-- Left Joy-Con -->
  <path d="M 70 20 
           L 110 20 
           L 110 180 
           L 70 180 
           C 50 180, 35 155, 35 120 
           C 35 85, 50 20, 70 20 Z" class="joycon-l" />
           
  <!-- Left Controls -->
  <!-- Left Thumbstick -->
  <circle cx="70" cy="55" r="14" class="stick-base" />
  <circle cx="70" cy="55" r="9" fill="#1c1b22" />
  <!-- Left Direction Buttons -->
  <g transform="translate(70, 115)">
    <circle cx="0" cy="-12" r="5.5" class="btn-dark" />
    <circle cx="-12" cy="0" r="5.5" class="btn-dark" />
    <circle cx="12" cy="0" r="5.5" class="btn-dark" />
    <circle cx="0" cy="12" r="5.5" class="btn-dark" />
  </g>
  <!-- Minus button -->
  <rect x="90" y="32" width="10" height="3" rx="1" fill="#1c1b22" />
  <!-- Capture button -->
  <rect x="88" y="155" width="10" height="10" rx="2" fill="#1c1b22" />

  <!-- Right Joy-Con -->
  <path d="M 380 20 
           L 340 20 
           L 340 180 
           L 380 180 
           C 400 180, 415 155, 415 120 
           C 415 85, 400 20, 380 20 Z" class="joycon-r" />

  <!-- Right Controls -->
  <!-- Action Buttons -->
  <g transform="translate(380, 55)">
    <circle cx="0" cy="-12" r="5.5" class="btn-dark" />
    <circle cx="-12" cy="0" r="5.5" class="btn-dark" />
    <circle cx="12" cy="0" r="5.5" class="btn-dark" />
    <circle cx="0" cy="12" r="5.5" class="btn-dark" />
    
    <!-- Action markers -->
    <text x="0" y="-9" font-family="sans-serif" font-size="5" fill="#fff" text-anchor="middle">X</text>
    <text x="-12" y="3" font-family="sans-serif" font-size="5" fill="#fff" text-anchor="middle">Y</text>
    <text x="12" y="3" font-family="sans-serif" font-size="5" fill="#fff" text-anchor="middle">A</text>
    <text x="0" y="15" font-family="sans-serif" font-size="5" fill="#fff" text-anchor="middle">B</text>
  </g>
  <!-- Right Thumbstick -->
  <circle cx="380" cy="115" r="14" class="stick-base" />
  <circle cx="380" cy="115" r="9" fill="#1c1b22" />
  <!-- Plus button -->
  <path d="M 350 35 L 356 35 M 353 32 L 353 38" stroke="#1c1b22" stroke-width="2" />
  <!-- Home button -->
  <circle cx="362" cy="160" r="6" fill="#1c1b22" />
  <circle cx="362" cy="160" r="4.5" fill="none" stroke="#8b949e" stroke-width="0.8" />

  <!-- Center Console Screen Bezel -->
  <rect x="110" y="20" width="230" height="160" class="bezel" />
  <!-- LCD screen -->
  <rect x="120" y="28" width="210" height="144" class="screen" />

  <!-- Launcher Dashboard Details inside Switch screen -->
  <text x="130" y="45" font-family="'Fira Code', monospace" font-size="8" fill="#8b949e">SELECT LANGUAGE</text>
  
  <g transform="translate(130, 55)">
    <!-- Game Card 1 -->
    <g>
      <rect x="0" y="0" width="90" height="40" class="game-card" stroke="#ff007f" />
      <text x="8" y="15" class="game-txt" font-weight="bold">Option 1: Python</text>
      <text x="8" y="27" class="game-txt" font-size="6" fill="#00f0ff">ACTIVE PLAY</text>
    </g>
    <!-- Game Card 2 -->
    <g transform="translate(100, 0)">
      <rect x="0" y="0" width="90" height="40" class="game-card" />
      <text x="8" y="15" class="game-txt" font-weight="bold">Option 2: Java</text>
      <text x="8" y="27" class="game-txt" font-size="6" fill="#8b949e">STANDBY</text>
    </g>
  </g>

  <!-- Bottom launcher controls row (Y = 115) -->
  <g transform="translate(130, 115)" font-family="'Fira Code', monospace" font-size="6" fill="#8b949e">
    <!-- Menu Circle 1: eShop -->
    <circle cx="8" cy="20" r="5.5" fill="#161925" stroke="#30363d" />
    <rect x="6" y="18.5" width="4" height="3.5" rx="0.5" fill="#ff0055" />
    <path d="M 6.5 18.5 Q 8 16.5 9.5 18.5" stroke="#ff0055" stroke-width="0.6" fill="none" />

    <!-- Menu Circle 2: Controllers -->
    <circle cx="28" cy="20" r="5.5" fill="#161925" stroke="#30363d" />
    <path d="M 26 20 H 30 M 28 18 V 22" stroke="#00f0ff" stroke-width="0.8" />

    <!-- Menu Circle 3: Album -->
    <circle cx="48" cy="20" r="5.5" fill="#161925" stroke="#30363d" />
    <rect x="45.5" y="17.5" width="5" height="5" stroke="#7ee787" stroke-width="0.8" fill="none" rx="0.5" />

    <!-- Menu Circle 4: Settings -->
    <circle cx="68" cy="20" r="5.5" fill="#161925" stroke="#30363d" />
    <circle cx="68" cy="20" r="1.5" stroke="#bb9af3" stroke-width="0.8" fill="none" />
    <path d="M 68 16.5 V 17.5 M 68 22.5 V 23.5 M 64.5 20 H 65.5 M 70.5 20 H 71.5" stroke="#bb9af3" stroke-width="0.6" />

    <!-- Navigation guide -->
    <text x="88" y="22" font-size="6">Options</text>
  </g>
</svg>
