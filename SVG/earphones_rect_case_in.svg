<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300" fill="none">
  <style>
    .case-shell { fill: rgba(255, 255, 255, 0.05); stroke: rgba(255, 255, 255, 0.15); stroke-width: 2; rx: 18; ry: 18; filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.35)); }
    .case-magnet { fill: #ffffff; stroke: #d1d5db; stroke-width: 0.5; }
    .dock-well { fill: #0a0b10; stroke: #1f2335; stroke-width: 1; rx: 6; ry: 6; }
    
    /* Transparent Earbuds (Nothing style) */
    .earbud-head { fill: #ffffff; stroke: #d1d5db; stroke-width: 0.6; }
    .earbud-stem { fill: rgba(255, 255, 255, 0.15); stroke: rgba(255, 255, 255, 0.3); stroke-width: 0.8; rx: 3; ry: 3; }
    .circuit-line { stroke: #00f0ff; stroke-width: 0.8; stroke-linecap: round; }
    .circuit-dot-l { fill: #ff007f; }
  </style>

  <!-- Transparent Rectangular Case Shell (Center 150, 140) -->
  <rect x="75" y="65" width="150" height="150" class="case-shell" />
  
  <!-- Hinge Block at top -->
  <rect x="120" y="66" width="60" height="12" fill="#2d2b38" stroke="#1c1b22" rx="2" />
  <!-- Magnet Indicator Dots (White & Red alignment) -->
  <circle cx="150" cy="140" r="4" fill="#ffffff" />
  <circle cx="150" cy="140" r="2.5" fill="#ff0055" />

  <!-- Left Dock Well -->
  <rect x="95" y="100" width="40" height="85" class="dock-well" />
  <!-- Right Dock Well -->
  <rect x="165" y="100" width="40" height="85" class="dock-well" />

  <!-- Docked Transparent Earbuds (Left and Right) -->
  <!-- Left Earbud Docked -->
  <g transform="translate(100, 105)">
    <rect x="18" y="15" width="10" height="50" class="earbud-stem" />
    <line x1="23" y1="22" x2="23" y2="55" class="circuit-line" stroke="#ff007f" />
    <circle cx="23" cy="22" r="1.5" class="circuit-dot-l" />
    <circle cx="13" cy="12" r="11" class="earbud-head" />
    <ellipse cx="5" cy="12" rx="5" ry="8" fill="#e5e7eb" />
  </g>

  <!-- Right Earbud Docked -->
  <g transform="translate(170, 105)">
    <rect x="2" y="15" width="10" height="50" class="earbud-stem" />
    <line x1="7" y1="22" x2="7" y2="55" class="circuit-line" />
    <circle cx="7" cy="22" r="1.5" fill="#7ee787" style="filter: drop-shadow(0 0 1px #7ee787);" />
    <circle cx="17" cy="12" r="11" class="earbud-head" />
    <ellipse cx="25" cy="12" rx="5" ry="8" fill="#e5e7eb" />
  </g>

  <!-- Quote inside SVG in Neon Green -->
  <text x="150" y="260" font-family="'Fira Code', monospace, sans-serif" font-size="10.5" font-weight="bold" fill="#7ee787" text-anchor="middle" style="filter: drop-shadow(0 0 1.5px #7ee787);">In the middle of nothing, find yourself.</text>
</svg>
