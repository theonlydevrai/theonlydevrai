<svg xmlns="http://www.w3.org/2000/svg" width="350" height="450" viewBox="0 0 350 450" fill="none">
  <style>
    .case-outer { fill: #1e1e2e; stroke: #313244; stroke-width: 4.5; rx: 20; ry: 20; }
    .screen-glass { fill: #0a0512; stroke: #ff007f; stroke-width: 1.5; filter: drop-shadow(0px 0px 6px rgba(255, 0, 127, 0.35)); rx: 12; ry: 12; }
    .hinge-crease { stroke: #11111b; stroke-width: 3.5; }
    
    /* Code and HUD elements */
    .hud-txt { font-family: 'Fira Code', monospace; font-size: 8px; fill: #ffffff; }
    .code-line { stroke-width: 2.2; stroke-linecap: round; }
    
    /* Gauge meter animations */
    .ring-bg { stroke: #1f2335; stroke-width: 3; fill: none; }
    .gauge-no { stroke: #ff007f; stroke-width: 3; fill: none; stroke-linecap: round; transform-origin: 25px 45px; animation: gage-no 4s infinite ease-in-out; }
    .gauge-yes { stroke: #7ee787; stroke-width: 3; fill: none; stroke-linecap: round; transform-origin: 85px 45px; animation: gage-yes 4s infinite ease-in-out; }
    
    @keyframes gage-no {
      0%, 100% { stroke-dashoffset: 90; transform: rotate(-90deg); }
      50% { stroke-dashoffset: 40; transform: rotate(10deg); }
    }
    @keyframes gage-yes {
      0%, 100% { stroke-dashoffset: 30; transform: rotate(-90deg); }
      50% { stroke-dashoffset: 80; transform: rotate(-190deg); }
    }

    /* Sequential Review Feed Animations */
    @keyframes fade-word {
      0%, 80%, 100% { opacity: 0; transform: translateY(3px); }
      15%, 70% { opacity: 1; transform: translateY(0); }
    }
    .feed-item { font-family: 'Fira Code', monospace; font-size: 7px; animation: fade-word 6s infinite ease-in-out; }

    /* Sequential QWERTY/Typewriter lines draw animation */
    @keyframes draw-line {
      0%, 20% { stroke-dashoffset: 90; }
      50%, 85% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 90; }
    }
    .code-line-anim {
      stroke-dasharray: 90;
      animation: draw-line 8s infinite ease-in-out;
    }
  </style>

  <!-- Foldable Phone Casing -->
  <rect x="25" y="20" width="300" height="410" class="case-outer" />
  
  <!-- Widescreen glass surface -->
  <rect x="35" y="30" width="280" height="390" class="screen-glass" />

  <!-- Folding Center Crease Line -->
  <line x1="175" y1="30" x2="175" y2="420" class="hinge-crease" />

  <!-- Left Column: NLP Dashboard (X = 45 to 165) -->
  <g transform="translate(45, 50)">
    <text x="0" y="10" class="hud-txt" font-weight="bold" fill="#00f0ff">GENUINE REVIEW</text>
    
    <!-- Circular gauge 1: NO -->
    <circle cx="25" cy="45" r="18" class="ring-bg" />
    <circle cx="25" cy="45" r="18" class="gauge-no" stroke-dasharray="113" />
    <text x="25" y="48" class="hud-txt" font-size="7" text-anchor="middle" fill="#ff007f">NO</text>

    <!-- Circular gauge 2: YES -->
    <circle cx="85" cy="45" r="18" class="ring-bg" />
    <circle cx="85" cy="45" r="18" class="gauge-yes" stroke-dasharray="113" />
    <text x="85" y="48" class="hud-txt" font-size="7" text-anchor="middle" fill="#7ee787">YES</text>

    <!-- Oscilloscope waveform: FAKE REVIEWS -->
    <text x="0" y="90" class="hud-txt" font-size="7" fill="#8b949e">FAKE REVIEWS</text>
    <rect x="0" y="98" width="110" height="45" fill="#13121d" stroke="#313244" stroke-width="0.8" rx="4" />
    <!-- Oscilloscope wave -->
    <path d="M 5 120 C 15 100, 20 140, 30 120 C 40 100, 45 140, 55 120 C 65 100, 70 140, 80 120 C 90 100, 100 140, 105 120" stroke="#ff007f" stroke-width="1.2" fill="none" />
    
    <!-- Review Feed stream -->
    <text x="0" y="165" class="hud-txt" font-size="7" fill="#8b949e">REVIEWS_FEED: active</text>
    <rect x="0" y="172" width="110" height="150" fill="#07080d" stroke="#313244" stroke-width="0.8" rx="4" />
    
    <!-- Sequential review words -->
    <g transform="translate(8, 172)">
      <text x="0" y="20" class="feed-item" fill="#7ee787" style="animation-delay: 0.5s;">&gt; Nice</text>
      <text x="0" y="40" class="feed-item" fill="#7ee787" style="animation-delay: 1.3s;">&gt; Good</text>
      <text x="0" y="60" class="feed-item" fill="#ff0055" style="animation-delay: 2.1s;">&gt; Bad</text>
      <text x="0" y="80" class="feed-item" fill="#7ee787" style="animation-delay: 2.9s;">&gt; Best</text>
      <text x="0" y="100" class="feed-item" fill="#ff0055" style="animation-delay: 3.7s;">&gt; Poor</text>
      <text x="0" y="120" class="feed-item" fill="#00f0ff" style="animation-delay: 4.5s;">&gt; Recommended</text>
    </g>
  </g>

  <!-- Right Column: Terms and Conditions Analysis (X = 185 to 305) -->
  <g transform="translate(185, 50)">
    <text x="0" y="10" class="hud-txt" font-weight="bold" fill="#7ee787">TERMS &amp; CONDITIONS</text>
    <text x="0" y="22" class="hud-txt" font-size="7" fill="#8b949e">nlp/risk_analyzer.py</text>
    
    <!-- Analysis visual Lines -->
    <rect x="0" y="32" width="110" height="285" fill="#07090e" rx="4" stroke="#313244" stroke-width="0.8" />
    <g transform="translate(8, 45)">
      <!-- Alternating color lines drawing sequentially -->
      <line x1="0" y1="5" x2="35" y2="5" class="code-line code-line-anim" stroke="#ff7b72" style="animation-delay: 0.2s;" />
      <line x1="0" y1="17" x2="65" y2="17" class="code-line code-line-anim" stroke="#58a6ff" style="animation-delay: 0.5s;" />
      <line x1="10" y1="29" x2="80" y2="29" class="code-line code-line-anim" stroke="#8b949e" style="animation-delay: 0.8s;" />
      <line x1="10" y1="41" x2="55" y2="41" class="code-line code-line-anim" stroke="#7ee787" style="animation-delay: 1.1s;" />
      <line x1="20" y1="53" x2="90" y2="53" class="code-line code-line-anim" stroke="#d2a8ff" style="animation-delay: 1.4s;" />
      <line x1="20" y1="65" x2="70" y2="65" class="code-line code-line-anim" stroke="#8b949e" style="animation-delay: 1.7s;" />
      <line x1="10" y1="77" x2="85" y2="77" class="code-line code-line-anim" stroke="#ff7b72" style="animation-delay: 2.0s;" />
      <line x1="0" y1="89" x2="45" y2="89" class="code-line code-line-anim" stroke="#58a6ff" style="animation-delay: 2.3s;" />

      <line x1="0" y1="105" x2="55" y2="105" class="code-line code-line-anim" stroke="#ffe600" style="animation-delay: 2.6s;" />
      <line x1="10" y1="117" x2="75" y2="117" class="code-line code-line-anim" stroke="#8b949e" style="animation-delay: 2.9s;" />
      <line x1="10" y1="129" x2="65" y2="129" class="code-line code-line-anim" stroke="#7ee787" style="animation-delay: 3.2s;" />
      <line x1="20" y1="141" x2="90" y2="141" class="code-line code-line-anim" stroke="#d2a8ff" style="animation-delay: 3.5s;" />
    </g>
  </g>
</svg>
