<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260" fill="none">
  <style>
    .gamepad-body { fill: #1e1e2e; stroke: #313244; stroke-width: 3; filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.3)); }
    .cross-key { fill: #313244; stroke: #1a1921; stroke-width: 1; }
    .btn-action { fill: #ff0055; stroke: #9e0031; stroke-width: 1; }
    .stick-base { fill: #11111b; stroke: #313244; stroke-width: 1.5; }
    
    /* Neon glow sticks */
    .stick-thumb { fill: #151624; stroke: #00f0ff; stroke-width: 2; filter: drop-shadow(0px 0px 4px #00f0ff); }
    .logo-glow { stroke: #ff007f; stroke-width: 1.5; filter: drop-shadow(0px 0px 3px #ff007f); fill: none; }
    
    /* Enlarge Top Display Screen */
    .screen-mount { fill: #131218; stroke: #313244; stroke-width: 2.5; rx: 6; ry: 6; }
    .screen-glass { fill: #07090e; stroke: #ff007f; stroke-width: 1.5; filter: drop-shadow(0px 0px 6px rgba(255, 0, 127, 0.4)); rx: 4; ry: 4; }
    .game-road-line { stroke: #ff007f; stroke-width: 1.5; opacity: 0.6; }
    .game-road-v { stroke: #00f0ff; stroke-width: 1; opacity: 0.6; }
    .game-txt { font-family: 'Fira Code', monospace; font-size: 7px; fill: #7ee787; font-weight: bold; }
    
    /* Road scroll animation in mini screen */
    .mini-road-move { animation: road-scroll-mini 0.5s infinite linear; }
    @keyframes road-scroll-mini {
      0% { transform: translateY(0); }
      100% { transform: translateY(12px); }
    }
  </style>

  <defs>
    <!-- Screen clip path for game visuals -->
    <clipPath id="mini-screen-clip">
      <rect x="106" y="16" width="188" height="88" rx="4" />
    </clipPath>
  </defs>

  <!-- Mounting Bracket -->
  <rect x="180" y="80" width="40" height="20" fill="#2d2b38" stroke="#1c1b22" />

  <!-- Large Game Console Display Screen -->
  <rect x="100" y="10" width="200" height="100" class="screen-mount" />
  <rect x="106" y="16" width="188" height="88" class="screen-glass" />

  <!-- Game Graphics (Zelda/Mario/Racing style mockup) -->
  <g clip-path="url(#mini-screen-clip)">
    <!-- Sky & Horizon -->
    <rect x="106" y="16" width="188" height="40" fill="#120c1f" />
    <circle cx="200" cy="56" r="16" fill="#ffe600" style="filter: drop-shadow(0 0 4px #ffe600);" />

    <!-- Perspective Road base -->
    <polygon points="200,56 294,104 106,104" fill="#0d0512" />

    <!-- Vertical road divider perspective lines -->
    <line x1="200" y1="56" x2="106" y2="104" class="game-road-v" />
    <line x1="200" y1="56" x2="150" y2="104" class="game-road-v" />
    <line x1="200" y1="56" x2="200" y2="104" class="game-road-v" stroke-dasharray="2 2" />
    <line x1="200" y1="56" x2="250" y2="104" class="game-road-v" />
    <line x1="200" y1="56" x2="294" y2="104" class="game-road-v" />

    <!-- Moving horizontal perspective lines -->
    <g class="mini-road-move">
      <line x1="106" y1="60" x2="294" y2="60" class="game-road-line" />
      <line x1="106" y1="72" x2="294" y2="72" class="game-road-line" />
      <line x1="106" y1="84" x2="294" y2="84" class="game-road-line" />
      <line x1="106" y1="96" x2="294" y2="96" class="game-road-line" />
      <line x1="106" y1="108" x2="294" y2="108" class="game-road-line" />
    </g>

    <!-- Player Car (Rear View) centered -->
    <g transform="translate(200, 84)">
      <!-- Car Body -->
      <rect x="-8" y="4" width="16" height="8" rx="2" fill="#151624" stroke="#ff0055" stroke-width="0.8" />
      <!-- Spoiler -->
      <line x1="-10" y1="3" x2="10" y2="3" stroke="#ff0055" stroke-width="1.5" />
      <!-- Tail lights -->
      <circle cx="-6" cy="6" r="1.2" fill="#ff0055" />
      <circle cx="6" cy="6" r="1.2" fill="#ff0055" />
      <!-- Wheels -->
      <rect x="-10" y="8" width="3" height="5" rx="1" fill="#111" />
      <rect x="7" y="8" width="3" height="5" rx="1" fill="#111" />
    </g>

    <!-- Score Readouts -->
    <text x="112" y="27" class="game-txt">SCORE: 12400</text>
    <text x="282" y="27" class="game-txt" fill="#ffe600" text-anchor="end">240 KM/H</text>
  </g>

  <!-- Gamepad Body Chassis Outline -->
  <path d="M 120 100 
           L 280 100 
           C 330 100, 370 130, 375 170 
           C 380 210, 340 250, 310 250 
           C 290 250, 270 230, 250 220 
           L 150 220 
           C 130 230, 110 250, 90 250 
           C 60 250, 20 210, 25 170 
           C 30 130, 70 100, 120 100 Z" class="gamepad-body" />

  <!-- D-PAD (Left Side, Center: 90, 160) -->
  <g transform="translate(90, 160)">
    <rect x="-10" y="-24" width="20" height="48" rx="3" class="cross-key" />
    <rect x="-24" y="-10" width="48" height="20" rx="3" class="cross-key" />
    <circle cx="0" cy="0" r="3" fill="#11111b" />
  </g>

  <!-- Action Buttons (Right Side, Center: 310, 160) -->
  <g transform="translate(310, 160)">
    <circle cx="0" cy="-16" r="6.5" class="btn-action" fill="#ffbd2e" />
    <circle cx="-16" cy="0" r="6.5" class="btn-action" fill="#38bdf8" />
    <circle cx="16" cy="0" r="6.5" class="btn-action" fill="#f43f5e" />
    <circle cx="0" cy="16" r="6.5" class="btn-action" fill="#4ade80" />
  </g>

  <!-- Left Thumbstick (Center: 150, 195) -->
  <g transform="translate(150, 195)">
    <circle cx="0" cy="0" r="18" class="stick-base" />
    <circle cx="-2" cy="-2" r="12" class="stick-thumb" />
    <circle cx="-2" cy="-2" r="4" fill="none" stroke="#00f0ff" stroke-width="0.8" opacity="0.5" />
  </g>

  <!-- Right Thumbstick (Center: 250, 195) -->
  <g transform="translate(250, 195)">
    <circle cx="0" cy="0" r="18" class="stick-base" />
    <circle cx="2" cy="2" r="12" class="stick-thumb" stroke="#ff007f" style="filter: drop-shadow(0px 0px 4px #ff007f);" />
    <circle cx="2" cy="2" r="4" fill="none" stroke="#ff007f" stroke-width="0.8" opacity="0.5" />
  </g>

  <!-- Home button (Center: 200, 140) -->
  <circle cx="200" cy="140" r="10" fill="#11111b" stroke="#313244" />
  <path d="M 196 142 C 196 134, 204 134, 204 142" class="logo-glow" />
</svg>
