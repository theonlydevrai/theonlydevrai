<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 38.51 38.51" id="gmail">
  <style>
    @keyframes gmailScalePop {
      0% {
        transform: scale(0.3);
        opacity: 0;
      }
      3% {
        transform: scale(1.05);
        opacity: 1;
      }
      4.2% {
        transform: scale(0.98);
      }
      6% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes gmailRotatePop {
      0% {
        transform: scale(0) rotate(-15deg);
        opacity: 0;
      }
      2% {
        transform: scale(0) rotate(-15deg);
        opacity: 0;
      }
      6.55% {
        transform: scale(1.1) rotate(5deg);
        opacity: 1;
      }
      7.95% {
        transform: scale(0.95) rotate(-2deg);
      }
      9% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    .bg-box {
      transform-origin: 19.255px 19.255px;
      animation: gmailScalePop 10s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
    }

    .logo-gmail {
      transform-origin: 19.255px 19.255px;
      animation: gmailRotatePop 10s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
    }
  </style>
