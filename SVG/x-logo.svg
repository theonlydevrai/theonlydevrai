<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" id="x-logo">
  <style>
    @keyframes xScalePop {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      59.9% {
        transform: scale(1);
        opacity: 1;
      }
      60% {
        transform: scale(0.3);
        opacity: 0;
      }
      63% {
        transform: scale(1.05);
        opacity: 1;
      }
      64.2% {
        transform: scale(0.98);
      }
      66% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes xRotatePop {
      0% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
      61.9% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
      62% {
        transform: scale(0) rotate(-15deg);
        opacity: 0;
      }
      66.55% {
        transform: scale(1.1) rotate(5deg);
        opacity: 1;
      }
      67.95% {
        transform: scale(0.95) rotate(-2deg);
      }
      69% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    .bg-box {
      transform-origin: 12px 12px;
      animation: xScalePop 10s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
    }

    .logo-x {
      transform-origin: 12px 12px;
      animation: xRotatePop 10s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
    }
  </style>
  <g>
    <!-- Background Square -->
    <rect class="bg-box" width="24" height="24" rx="4.8" fill="#000000"></rect>
    <!-- Inner X Letter -->
    <path class="logo-x" fill="#ffffff" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
  </g>
</svg>