<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350" fill="none">
  <style>
    .screen-bg { fill: #0f0f17; }
    .bezel { fill: #1c1b22; stroke: #2d2b38; stroke-width: 2; rx: 16; ry: 16; }
    .hinge { fill: #2d2b38; }
    .base-plate { fill: #25242d; stroke: #3a3847; stroke-width: 1.5; }
    .base-top { fill: #1c1b22; }
    .trackpad { fill: #15141a; stroke: #2d2b38; stroke-width: 1; rx: 4; ry: 4; }
    .glow-purple { filter: drop-shadow(0px 0px 8px rgba(190, 0, 255, 0.4)); }
    .text-title { fill: #8b949e; font-family: 'Fira Code', monospace, sans-serif; font-size: 11px; }
    .prompt { fill: #ff7b72; font-family: 'Fira Code', monospace, sans-serif; font-size: 12px; font-weight: bold; }
    .path { fill: #79c0ff; font-family: 'Fira Code', monospace, sans-serif; font-size: 12px; }
    .cmd { fill: #c9d1d9; font-family: 'Fira Code', monospace, sans-serif; font-size: 12px; }
    .success { fill: #7ee787; font-family: 'Fira Code', monospace, sans-serif; font-size: 11px; }
    .info { fill: #c9d1d9; font-family: 'Fira Code', monospace, sans-serif; font-size: 11px; }
    .accent { fill: #d2a8ff; font-family: 'Fira Code', monospace, sans-serif; font-size: 11px; }
    .flicker { animation: blink 1.2s infinite; }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
  </style>

  <!-- Laptop Screen Shadow -->
  <rect x="105" y="25" width="590" height="280" rx="16" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />

  <!-- Laptop Screen Bezel -->
  <rect x="100" y="20" width="600" height="280" rx="16" class="bezel glow-purple" />

  <!-- Screen Surface -->
  <rect x="115" y="32" width="570" height="256" rx="4" class="screen-bg" />

  <!-- Web Camera -->
  <circle cx="400" cy="26" r="3" fill="#0c0b0f" />
  <circle cx="400" cy="26" r="1.2" fill="#58a6ff" opacity="0.6" />

  <!-- Window Top Bar inside Screen -->
  <rect x="115" y="32" width="570" height="28" fill="#16151d" rx="4" />
  <circle cx="135" cy="46" r="4.5" fill="#ff5f56" />
  <circle cx="150" cy="46" r="4.5" fill="#ffbd2e" />
  <circle cx="165" cy="46" r="4.5" fill="#27c93f" />
  <text x="400" y="50" class="text-title" text-anchor="middle">spit-mumbai: dev_rai.sh</text>

  <!-- Terminal Content inside Screen -->
  <g transform="translate(130, 75)">
    <!-- Prompt Line 1 -->
    <text x="0" y="0">
      <tspan class="prompt">theonlydevrai</tspan>
      <tspan class="info">@</tspan>
      <tspan class="accent">spit-mumbai</tspan>
      <tspan class="info">:</tspan>
      <tspan class="path">~/profile</tspan>
      <tspan class="info">$ ./boot_systems.sh</tspan>
    </text>

    <!-- Logging output (Replaced project references with generic terminal hardware boot states) -->
    <text x="15" y="20" class="success">✔ Parse layout configs: Done (active_devices = 23)</text>
    <text x="15" y="36" class="success">✔ Establish secure database link (spit_mumbai_node: OK)</text>
    <text x="15" y="52" class="accent">⚡ Virtual workstation load completed. System operational.</text>

    <!-- Prompt Line 2 -->
    <text x="0" y="76">
      <tspan class="prompt">theonlydevrai</tspan>
      <tspan class="info">@</tspan>
      <tspan class="accent">spit-mumbai</tspan>
      <tspan class="info">:</tspan>
      <tspan class="path">~/profile</tspan>
      <tspan class="info">$ neofetch</tspan>
    </text>

    <!-- Neofetch Bullet Points (Personal details only) -->
    <text x="15" y="98" class="info"><tspan fill="#ff007f" font-weight="bold">NAME      :</tspan> Dev Rai</text>
    <text x="15" y="114" class="info"><tspan fill="#00f0ff" font-weight="bold">COLLEGE   :</tspan> Sardar Patel Institute of Technology (SPIT), Mumbai</text>
    <text x="15" y="130" class="info"><tspan fill="#ffe600" font-weight="bold">MAJOR     :</tspan> Computer Engineering</text>
    <text x="15" y="146" class="info"><tspan fill="#7ee787" font-weight="bold">MINOR     :</tspan> Industrial Internet of Things (IIoT)</text>
    <text x="15" y="162" class="info"><tspan fill="#cba6f7" font-weight="bold">STATUS    :</tspan> Building clean systems &amp; software architectures</text>
    
    <!-- Cursor -->
    <text x="15" y="180" class="info" font-weight="bold">~$ <tspan class="flicker">_</tspan></text>
  </g>

  <!-- Hinge -->
  <path d="M280,300 L520,300 L530,305 L270,305 Z" class="hinge" />

  <!-- Laptop Base Chassis Base Shadow -->
  <ellipse cx="400" cy="335" rx="360" ry="8" fill="rgba(0,0,0,0.2)" filter="blur(4px)" />

  <!-- Laptop Base Bottom plate -->
  <rect x="60" y="300" width="680" height="12" class="base-plate" rx="6" />
  <rect x="60" y="300" width="680" height="4" class="base-top" />

  <!-- Trackpad -->
  <rect x="345" y="304" width="110" height="6" class="trackpad" />
</svg>
